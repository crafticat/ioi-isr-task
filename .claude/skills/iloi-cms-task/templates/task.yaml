# Template task.yaml for an ILOI batch-with-grader task.
#
# TWO SCHEMAS EXIST — this template targets the CANONICAL one (below), which is
# what the production ILOI CMS importer accepts and what `task/<id>/export`
# round-trips to. It is a *superset*: the dev-time `italy_yaml` loader in the
# local ../cms checkout ignores the extra keys (it auto-derives task type from
# the on-disk layout), and the production importer consumes them. Authoring in
# this schema means the package you hand off imports cleanly into the real CMS
# with no manual fix-up. (The ILOI team re-exported Uchuva/DamLogs into exactly
# this shape — the diffs are what this template encodes.)
#
# Do NOT use !!python/tuple anywhere. All scores are floats (100.0, not 100).

name: TASKNAME
title: English Title                 # canonical form keeps the title in English;
                                     # the Hebrew title lives in the statement.
primary_language: he
version: Default

# Contestant submits a single source file named after the task.
submission_format:
- TASKNAME.%l

# oi_restricted = ILOI production default (per-subtask feedback, no test bytes).
feedback_level: oi_restricted
# max_subtask: the contestant's best score per subtask across submissions.
score_mode: max_subtask

# Tokens — copy verbatim unless the contest overrides. Use token_mode: infinite
# for practice/analysis visibility, disabled for a real timed round.
token_mode: disabled
token_min_interval: 0
token_gen_initial: 2
token_gen_number: 2
token_gen_interval: 1800

# 2 decimal places in the scoreboard.
score_precision: 2

# From the statement.
time_limit: 1.0
memory_limit: 1024

# ---- Task type (canonical discrete keys — replaces task_type_parameters) ----
# compilation: "grader" if you ship managers/grader.cpp, else "alone".
# output_eval: "comparator" if you ship managers/checker.cpp for partial credit,
#              else "diff" for exact match.
compilation: grader
infile: ''
outfile: ''
output_eval: comparator

# ---- Scoring: regex-based GroupMin with subtask containment ----------------
# Each subtask K matches every test whose codename matches its regex, so a
# single test can belong to multiple subtasks (proper containment). Sum of
# points MUST be exactly 100.
#
# Codename convention: tests are named input_ST0_ST1_..._NNN_<letters>.txt with
# the ST-tags naming exactly the subtasks each test satisfies. The `(?#CMS)`
# marker is a regex inline comment (a no-op) used as a boundary so `.*ST1_`
# can't accidentally match ST10/ST11. This is more robust than bare `.*a.*`
# single-letter codenames (which DamLogs still uses and also works).
score_type: GroupMin
score_type_parameters:
- - 0
  - .*ST0_(?#CMS)                    # samples (0 pts)
- - 3
  - .*ST1_(?#CMS)                    # subtask 1
- - 4
  - .*ST2_(?#CMS)                    # subtask 2
- - 21
  - .*ST3_(?#CMS)                    # subtask 3
- - 35
  - .*ST4_(?#CMS)                    # subtask 4
- - 37
  - .*ST5_(?#CMS)                    # subtask 5 (full)

# n_input MUST equal the number of input_*.txt files inside tests.zip.
n_input: 0
input_template: input_*.txt
output_template: output_*.txt

# Per-test verdict visibility only — never exposes raw test bytes. Safe to
# leave "all" (see SKILL failure-mode #16).
public_testcases: all

# ---- Reference solutions (calibration guards) ------------------------------
# Ship one solution per subtask that scores EXACTLY that subtask and nothing
# else, plus the full solution and any cheap-exploit ceilings. Declare
# subtask_expected_scores (not just the total) so a calibration drift in ANY
# single subtask fails the import, not just a change in the grand total.
model_solutions:
- name: full
  description: Intended solution.
  expected_score_min: 100.0
  expected_score_max: 100.0
  language: C++17 / g++
  files:
  - TASKNAME.cpp
# Single-subtask probe — pins ST3 (and only ST3) to its full value.
# - name: st3_only
#   description: Solves only subtask 3.
#   expected_score_min: 21.0
#   expected_score_max: 21.0
#   language: C++17 / g++
#   subtask_expected_scores:
#     '1': {min: 0.0, max: 0.0}
#     '2': {min: 0.0, max: 0.0}
#     '3': {min: 21.0, max: 21.0}
#     '4': {min: 0.0, max: 0.0}
#     '5': {min: 0.0, max: 0.0}
#   files:
#   - TASKNAME.cpp
# Partial-credit floor probe — a correct-verdict-only solver should collect
# exactly 15% of every subtask under the 15% rule; pin those fractions so a
# checker/GEN change that moves the floor is caught immediately.
# - name: verdict_only
#   description: Correct existence, wrong value — prices the 15% floor.
#   expected_score_min: 15.0
#   expected_score_max: 15.0
#   language: C++17 / g++
#   subtask_expected_scores:
#     '1': {min: 0.45, max: 0.45}
#     '2': {min: 0.60, max: 0.60}
#     '3': {min: 3.15, max: 3.15}
#     '4': {min: 5.25, max: 5.25}
#     '5': {min: 5.55, max: 5.55}
#   files:
#   - TASKNAME.cpp

# ---- Generators ------------------------------------------------------------
generators:
- filename: generator.cpp
  input_template: input.*
  output_template: output.*
  language: C++17 / g++

# ---- Validators: one per subtask, registered by index ----------------------
# The production importer requires validators to be DECLARED here (the local
# italy_yaml dev-loader auto-detects them from validators/, but the export
# format lists them explicitly). subtask_index is 0-based; index 0 == samples.
validators:
- filename: validator_0.cpp
  subtask_index: 0
- filename: validator_1.cpp
  subtask_index: 1
- filename: validator_2.cpp
  subtask_index: 2
- filename: validator_3.cpp
  subtask_index: 3
- filename: validator_4.cpp
  subtask_index: 4
- filename: validator_5.cpp
  subtask_index: 5
